apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr
  namespace: media
spec:
  schedule: "@daily" # Run once a day
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: recyclarr
        spec:
          restartPolicy: OnFailure
          securityContext:
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:latest
              imagePullPolicy: IfNotPresent
              command: ["recyclarr", "sync"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: TZ
                  value: "Etc/UTC"
                # API Keys from Secrets (for recyclarr.yml !env_var substitution)
                - name: SONARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: sonarr-secret
                      key: api_key
                - name: RADARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: radarr-secret
                      key: api_key
              volumeMounts:
                - name: config
                  mountPath: /config/recyclarr.yml
                  subPath: recyclarr.yml
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: config
              configMap:
                name: recyclarr-config
            - name: tmp
              emptyDir: {}
