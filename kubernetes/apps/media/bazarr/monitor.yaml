apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bazarr
  namespace: media
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: bazarr
  endpoints:
    - port: metrics
      scheme: http
      path: /metrics
      interval: 1m
      scrapeTimeout: 10s
